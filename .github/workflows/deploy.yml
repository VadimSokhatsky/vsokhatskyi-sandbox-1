name: Deploy to GitHub Pages

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set deploy paths
        id: paths
        run: |
          REPO_NAME="vsokhatskyi-sandbox-1"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "vite_base=/${REPO_NAME}/" >> $GITHUB_OUTPUT
            echo "is_main=true" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
            echo "vite_base=/${REPO_NAME}/previews/${BRANCH}/" >> $GITHUB_OUTPUT
            echo "dest_dir=previews/${BRANCH}" >> $GITHUB_OUTPUT
            echo "is_main=false" >> $GITHUB_OUTPUT
          fi
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE: ${{ steps.paths.outputs.vite_base }}
      - name: Deploy main
        if: steps.paths.outputs.is_main == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
      - name: Deploy preview
        if: steps.paths.outputs.is_main != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.paths.outputs.dest_dir }}
          keep_files: true
